name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: vr-show

jobs:
  # ── Linux (x86_64) ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev \
            libxkbcommon-dev libwayland-dev libxinerama-dev \
            libegl1-mesa-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build (release)
        run: cargo build --release

      - name: Package .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p vr-show

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/$BIN_NAME dist/
          tar -czf $BIN_NAME-linux-x86_64.tar.gz -C dist $BIN_NAME

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: vr-show-linux-deb
          path: target/debian/*.deb

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: vr-show-linux-tarball
          path: vr-show-linux-x86_64.tar.gz

  # ── macOS ───────────────────────────────────────────────────────
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          tar -czf $BIN_NAME-macos-${{ matrix.suffix }}.tar.gz \
            -C target/${{ matrix.target }}/release $BIN_NAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vr-show-macos-${{ matrix.suffix }}
          path: vr-show-macos-${{ matrix.suffix }}.tar.gz

  # ── Windows (x86_64) ────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build (release)
        run: cargo build --release

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/$env:BIN_NAME.exe `
            -DestinationPath $env:BIN_NAME-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vr-show-windows
          path: vr-show-windows-x86_64.zip

  # ── Create GitHub Release ──────────────────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
